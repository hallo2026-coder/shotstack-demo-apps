<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Shotstack – AI Video Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0f172a, #030712);
            min-height: 100vh;
            padding: 1rem;
            color: #e2e8f0;
        }
        .card {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        h1 {
            font-size: 1.9rem;
            background: linear-gradient(to right, #a855f7, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .sub {
            color: #94a3b8;
            margin: 0.5rem 0 1.5rem;
            border-left: 3px solid #a855f7;
            padding-left: 0.8rem;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        input {
            flex: 1;
            padding: 0.9rem 1rem;
            font-size: 1rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 2rem;
            color: white;
        }
        button {
            background: #8b5cf6;
            border: none;
            padding: 0.9rem 1.5rem;
            font-weight: 600;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            transition: 0.1s;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background: #4c1d95; opacity: 0.7; cursor: not-allowed; }
        .script-box {
            background: #0f172a;
            border-radius: 1.25rem;
            padding: 1rem;
            margin: 1rem 0;
            border-left: 4px solid #8b5cf6;
            font-size: 0.9rem;
        }
        .status {
            background: #1e293b;
            border-radius: 1rem;
            padding: 0.8rem;
            margin: 1rem 0;
            font-family: monospace;
            font-size: 0.85rem;
        }
        video {
            width: 100%;
            border-radius: 1.25rem;
            margin-top: 1rem;
            box-shadow: 0 10px 20px -5px black;
        }
        .loader {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 550px) {
            .card { padding: 1rem; }
            .input-group { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🤖 AI Video Agent</h1>
    <div class="sub">GPT / Groq generates script → Shotstack renders video</div>

    <div class="input-group">
        <input type="text" id="topicInput" placeholder="e.g., Why video automation is the future" value="The power of API-first video editing">
        <button id="generateBtn">✨ Generate & Render</button>
    </div>

    <div id="scriptOutput" class="script-box" style="display: none;"></div>
    <div id="status" class="status">💡 Ready. Enter a topic and click generate.</div>
    <div id="videoContainer"></div>
</div>

<script>
    const generateBtn = document.getElementById('generateBtn');
    const topicInput = document.getElementById('topicInput');
    const scriptDiv = document.getElementById('scriptOutput');
    const statusDiv = document.getElementById('status');
    const videoContainer = document.getElementById('videoContainer');

    generateBtn.addEventListener('click', async () => {
        const topic = topicInput.value.trim();
        if (!topic) {
            statusDiv.innerHTML = '⚠️ Please enter a topic.';
            return;
        }

        generateBtn.disabled = true;
        generateBtn.innerHTML = '<span class="loader"></span> Generating script...';
        scriptDiv.style.display = 'block';
        scriptDiv.innerHTML = '🧠 Contacting AI (OpenAI or Groq)...';
        statusDiv.innerHTML = '⏳ Step 1: Generating script with LLM...';
        videoContainer.innerHTML = '';

        try {
            // 1. Generate script
            const genRes = await fetch('/generate_script', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ topic })
            });
            const scriptData = await genRes.json();
            if (scriptData.error) throw new Error(scriptData.error);
            
            const scenes = scriptData.scenes;
            scriptDiv.innerHTML = `<strong>📝 AI‑generated script:</strong><br>${scenes.map((s,i) => `${i+1}. ${s}`).join('<br>')}`;
            
            // 2. Render video
            statusDiv.innerHTML = '🎬 Step 2: Sending to Shotstack renderer...';
            const renderRes = await fetch('/render', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ scenes })
            });
            const renderData = await renderRes.json();
            if (renderData.error) throw new Error(renderData.error);
            
            const renderId = renderData.render_id;
            statusDiv.innerHTML = `⏳ Rendering video (ID: ${renderId})...`;
            
            let videoUrl = null;
            for (let i = 0; i < 60; i++) {
                await new Promise(r => setTimeout(r, 2000));
                const statusRes = await fetch(`/status/${renderId}`);
                const statusData = await statusRes.json();
                if (statusData.status === 'done') {
                    videoUrl = statusData.url;
                    break;
                } else if (statusData.status === 'failed') {
                    throw new Error('Shotstack render failed');
                }
            }
            
            if (videoUrl) {
                statusDiv.innerHTML = '✅ AI video ready!';
                videoContainer.innerHTML = `<video controls autoplay loop playsinline src="${videoUrl}"></video>`;
            } else {
                throw new Error('Render timeout');
            }
        } catch (err) {
            statusDiv.innerHTML = `❌ ${err.message}`;
            scriptDiv.innerHTML = `⚠️ Error: ${err.message}`;
        } finally {
            generateBtn.disabled = false;
            generateBtn.innerHTML = '✨ Generate & Render';
        }
    });
</script>
</body>
</html>
