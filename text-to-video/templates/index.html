<!DOCTYPE html>
<html>
<head>
    <title>Shotstack: Text-to-Video</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 1rem; }
        textarea { width: 100%; padding: 0.5rem; font-size: 1rem; }
        button { background: #0a5c8c; color: white; border: none; padding: 0.75rem 1.5rem; cursor: pointer; }
        #status { margin-top: 1rem; padding: 1rem; background: #f0f0f0; border-radius: 8px; }
        video { max-width: 100%; margin-top: 1rem; }
    </style>
</head>
<body>
    <h1>🎬 Text-to-Video with Shotstack</h1>
    <textarea id="textInput" rows="4" placeholder="Enter your text here...">Hello from Shotstack! This video was generated by API.</textarea><br><br>
    <button id="renderBtn">Create Video</button>
    <div id="status">Ready</div>
    <div id="videoContainer"></div>

    <script>
        const renderBtn = document.getElementById('renderBtn');
        const statusDiv = document.getElementById('status');
        const videoContainer = document.getElementById('videoContainer');

        renderBtn.addEventListener('click', async () => {
            const text = document.getElementById('textInput').value;
            if (!text.trim()) return alert('Please enter some text');
            
            renderBtn.disabled = true;
            statusDiv.innerHTML = '⏳ Submitting render job...';
            
            try {
                const res = await fetch('/render', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                
                const renderId = data.render_id;
                statusDiv.innerHTML = `✅ Render queued (ID: ${renderId})<br>⏲️ Polling for completion...`;
                
                // Poll for status
                let videoUrl = null;
                for (let i = 0; i < 60; i++) { // max 2 minutes (2s intervals)
                    await new Promise(r => setTimeout(r, 2000));
                    const statusRes = await fetch(`/status/${renderId}`);
                    const statusData = await statusRes.json();
                    if (statusData.status === 'done') {
                        videoUrl = statusData.url;
                        break;
                    } else if (statusData.status === 'failed') {
                        throw new Error('Render failed: ' + statusData.message);
                    }
                    statusDiv.innerHTML = `⏳ Rendering... (${i+1}/60)`;
                }
                
                if (videoUrl) {
                    statusDiv.innerHTML = '✅ Video ready!';
                    videoContainer.innerHTML = `<video controls src="${videoUrl}" autoplay loop></video>`;
                } else {
                    throw new Error('Timeout waiting for video');
                }
            } catch (err) {
                statusDiv.innerHTML = `❌ Error: ${err.message}`;
            } finally {
                renderBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
