<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Shotstack – Text to Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            padding: 1rem;
            color: #eef2ff;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05);
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .sub {
            color: #9ca3af;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            border-left: 3px solid #3b82f6;
            padding-left: 0.75rem;
        }
        textarea {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-family: inherit;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 1.25rem;
            color: white;
            resize: vertical;
            transition: all 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.3);
        }
        button {
            width: 100%;
            background: #3b82f6;
            border: none;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 2rem;
            color: white;
            margin: 1rem 0;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        button:active { transform: scale(0.97); }
        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }
        .status-card {
            background: #0f172a;
            border-radius: 1.25rem;
            padding: 1rem;
            margin: 1rem 0;
            font-family: monospace;
            font-size: 0.9rem;
            word-break: break-word;
            border-left: 4px solid #3b82f6;
        }
        video {
            width: 100%;
            border-radius: 1.25rem;
            margin-top: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
        }
        .loader {
            display: inline-block;
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 500px) {
            .container { padding: 1rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎬 Text → Video</h1>
    <div class="sub">Generate a short video from any text — powered by Shotstack API</div>

    <textarea id="textInput" rows="4" placeholder="Write something...&#10;Example: 'Hello world! This video was created with Shotstack in seconds.'"></textarea>
    
    <button id="renderBtn">
        ✨ Create Video
    </button>

    <div id="status" class="status-card">✅ Ready</div>
    <div id="videoContainer"></div>
</div>

<script>
    const renderBtn = document.getElementById('renderBtn');
    const statusDiv = document.getElementById('status');
    const videoContainer = document.getElementById('videoContainer');

    renderBtn.addEventListener('click', async () => {
        const text = document.getElementById('textInput').value.trim();
        if (!text) {
            statusDiv.innerHTML = '⚠️ Please enter some text first.';
            return;
        }

        renderBtn.disabled = true;
        renderBtn.innerHTML = '<span class="loader"></span> Submitting...';
        statusDiv.innerHTML = '⏳ Sending to Shotstack...';

        try {
            const res = await fetch('/render', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);

            const renderId = data.render_id;
            statusDiv.innerHTML = `🎬 Render queued (ID: ${renderId})<br>⏲️ Waiting for completion...`;

            let videoUrl = null;
            for (let i = 0; i < 60; i++) {
                await new Promise(r => setTimeout(r, 2000));
                const statusRes = await fetch(`/status/${renderId}`);
                const statusData = await statusRes.json();
                if (statusData.status === 'done') {
                    videoUrl = statusData.url;
                    break;
                } else if (statusData.status === 'failed') {
                    throw new Error('Render failed: ' + (statusData.message || 'unknown'));
                }
                statusDiv.innerHTML = `⏳ Rendering... ${i+1}/60 (${(i+1)*2}s)`;
            }

            if (videoUrl) {
                statusDiv.innerHTML = '✅ Video ready! Tap to play.';
                videoContainer.innerHTML = `<video controls autoplay loop playsinline src="${videoUrl}"></video>`;
            } else {
                throw new Error('Timeout – video took too long');
            }
        } catch (err) {
            statusDiv.innerHTML = `❌ Error: ${err.message}`;
        } finally {
            renderBtn.disabled = false;
            renderBtn.innerHTML = '✨ Create Video';
        }
    });
</script>
</body>
</html>
